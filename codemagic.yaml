workflows:
  ios-build-preview:
    name: iOS Build (Preview)
    max_build_duration: 60
    environment:
      vars:
        EXPO_PUBLIC_API_URL: "https://closetly-be.vercel.app"
      node: 20
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install npm dependencies
        script: npm ci

      - name: Install EAS CLI
        script: npm install -g eas-cli@latest

      - name: Build iOS .ipa with EAS
        script: |
          eas build \
            --platform ios \
            --profile preview \
            --non-interactive \
            --wait

    artifacts:
      - build/**/*.ipa
      - build/**/*.dSYM.zip

    publishing:
      email:
        recipients:
          - johanayaradev@gmail.com
        notify:
          success: true
          failure: true
