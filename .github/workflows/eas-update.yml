name: EAS Update (main -> preview)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: eas-update-preview
  cancel-in-progress: true

jobs:
  publish-update:
    runs-on: ubuntu-latest
    steps:
      - name: Check EXPO_TOKEN secret
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "Missing EXPO_TOKEN secret in GitHub repository settings."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          token: ${{ secrets.EXPO_TOKEN }}
          eas-version: latest

      - name: Install dependencies
        run: npm ci

      - name: Publish OTA update to preview channel
        run: >
          npx eas-cli update --channel preview --platform all
          --message "main:${{ github.sha }}" --non-interactive
