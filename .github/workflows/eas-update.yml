name: EAS Update

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

concurrency:
  group: eas-update-${{ github.sha }}
  cancel-in-progress: false

jobs:
  publish-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          token: ${{ secrets.EXPO_TOKEN }}
          eas-version: latest

      - name: Install dependencies
        run: npm install

      - name: Determine channel from branch
        id: channel
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "channel=production" >> $GITHUB_OUTPUT
          else
            echo "channel=preview" >> $GITHUB_OUTPUT
          fi

      - name: Publish OTA update to ${{ steps.channel.outputs.channel }}
        run: >
          eas update --channel ${{ steps.channel.outputs.channel }} --platform all
          --message "${{ github.ref_name }}:${{ github.sha }}" --non-interactive
