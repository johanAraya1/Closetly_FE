name: EAS Update (main -> preview + production)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: eas-update-${{ github.sha }}
  cancel-in-progress: false

jobs:
  publish-update:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        channel: [preview, production]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          token: ${{ secrets.EXPO_TOKEN }}
          eas-version: latest

      - name: Install dependencies
        run: npm install

      - name: Publish OTA update to ${{ matrix.channel }}
        run: >
          eas update --channel ${{ matrix.channel }} --platform all
          --message "main:${{ github.sha }}" --non-interactive
